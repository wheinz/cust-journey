services:
  app:
    build: .
    env_file: .env
    volumes:
      - db_data:/app/data
      - ./backups:/app/backups
    restart: unless-stopped

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
