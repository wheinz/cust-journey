<div>
    <h2 class="text-lg font-semibold text-gray-900 mb-4">{{ title }}</h2>
    <form method="post" action="{{ request.path }}" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="{{ field.id_for_label }}">
                    {{ field.label }}
                </label>
                {% if field.field.widget.input_type == 'select' %}
                    <select name="{{ field.name }}" id="{{ field.id_for_label }}"
                            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        {% for value, label in field.field.choices %}
                            <option value="{{ value }}" {% if field.value == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                {% elif field.field.widget.input_type == 'textarea' %}
                    <textarea name="{{ field.name }}" id="{{ field.id_for_label }}"
                              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              rows="3">{{ field.value|default:'' }}</textarea>
                {% else %}
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" id="{{ field.id_for_label }}"
                           value="{{ field.value|default:'' }}"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                {% endif %}
                {% if field.errors %}
                    <p class="text-xs text-red-500 mt-1">{{ field.errors|join:', ' }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
            <button type="button"
                    @click="$dispatch('close-modal')"
                    class="px-4 py-2 text-sm text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors">
                Save
            </button>
        </div>
    </form>
</div>
