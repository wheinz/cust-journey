<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Customer Journey{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-6">
        <a href="{% url 'journey:home' %}" class="font-bold text-lg text-gray-800 hover:text-blue-600 transition-colors">
            Customer Journey
        </a>
        <a href="{% url 'journey:home' %}" class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            Journey Viewer
        </a>
        <a href="{% url 'kpi:table' %}" class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            KPI Framework
        </a>
        <a href="{% url 'kpi:hierarchy' %}" class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            KPI Hierarchy
        </a>
        <a href="{% url 'kpi:prioritize' %}" class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            Prioritize
        </a>
        <a href="{% url 'kpi:roadmap' %}" class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            Roadmap
        </a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="modal-container"
         x-data="{ open: false }"
         @open-modal.window="open = true"
         @close-modal.window="open = false"
         x-cloak>
        <div x-show="open"
             @click.self="$dispatch('close-modal')"
             class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[85vh] overflow-y-auto"
                 @click.stop>
                <div id="modal-content" class="p-6"></div>
            </div>
        </div>
    </div>

    {% block extra_body %}{% endblock %}
    <script>
        document.addEventListener('htmx:afterSettle', function(evt) {
            if (evt.target.id === 'modal-content') {
                window.dispatchEvent(new CustomEvent('open-modal'));
            }
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        document.body.addEventListener('htmx:configRequest', function(event) {
            event.detail.headers['X-CSRFToken'] = getCookie('csrftoken');
        });
    </script>
</body>
</html>
